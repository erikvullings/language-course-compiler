# Lesson theme catalog (language-agnostic). Per lesson, three OPTIONAL English
# authoring hints make generated text read as a coherent story instead of loose
# sentences (the LLM realizes them into the target language):
#   seedWords: concrete English anchor words that bias vocabulary selection
#              toward scene-grounding nouns (so early lessons aren't all light
#              function words). They resolve to lexicon entries via English glosses.
#   verbs:     English verbs the scene needs (the sentence "engine"); resolved to
#              the most-frequent matching target verb and taught first, so lessons
#              are not left with only nouns. Verbs live in a separate lexicon file.
#   outline:   a brief English scenario the writer follows for a coherent narrative.
# All are optional; omit them to fall back to theme + communicativeGoals only.
# seedWords/verbs are kept to a single coherent scene (e.g. a morning greeting),
# not a generic grab-bag, so the narrative stays natural.
A1:
