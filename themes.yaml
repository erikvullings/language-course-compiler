# Lesson theme catalog (language-agnostic). Per lesson, two OPTIONAL English
# authoring hints make generated text read as a coherent story instead of loose
# sentences (the LLM realizes them into the target language):
#   seedWords: concrete English anchor words that bias vocabulary selection
#              toward scene-grounding nouns (so early lessons aren't all light
#              function words). They resolve to lexicon entries via English glosses.
#   outline:   a brief English scenario the writer follows for a coherent narrative.
# Both are optional; omit them to fall back to theme + communicativeGoals only.
A1:
  lesson001:
    theme: Greetings
    communicativeGoals:
      - greet someone
      - introduce yourself
      - say goodbye
    seedWords: [hello, good morning, name, neighbour, street, goodbye]
    outline: >
      Two neighbours meet on the street in the morning. They greet each other,
      introduce themselves by name, ask how the other is, and say goodbye.

  lesson002:
    theme: Personal Information
    communicativeGoals:
      - say your name
      - ask someone's name
      - state your nationality
    seedWords: [name, city, country, address, age, family]
    outline: >
      A new colleague introduces herself to the team: her name, the city and
      country she comes from, where she lives now, and a little about her
      family.

  lesson003:
    theme: Numbers
    communicativeGoals:
