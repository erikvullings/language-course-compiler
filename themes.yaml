    theme: Greetings
    communicativeGoals:
      - greet someone
      - introduce yourself
      - say goodbye
    seedWords: [hello, good morning, name, neighbour, street, goodbye, welcome]
    verbs: [meet, greet, introduce, ask, say]
    outline: >
      Two neighbours meet on the street in the morning. One is new. They greet each other,
      introduce themselves by name, ask how the other is, and say goodbye.

